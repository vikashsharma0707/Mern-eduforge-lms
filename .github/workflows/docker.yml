name: LMS Docker CI/CD

on:
  push:
    branches:
      - main
      - master

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Image
        run: |
          docker build -t vikashsharma0707/lms-frontend:latest ./client

      - name: Build Backend Image
        run: |
          docker build -t vikashsharma0707/lms-backend:latest ./server

      - name: Push Frontend Image
        run: |
          docker push vikashsharma0707/lms-frontend:latest

      - name: Push Backend Image
        run: |
          docker push vikashsharma0707/lms-backend:latest