apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: lms

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: vikashsharma0707/lms-backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        env:
        - name: PORT
          value: "5000"

        - name: MONGO_URI
          value: "mongodb://mongodb-service:27017/lms"

        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: lms-secret
              key: JWT_SECRET

        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: lms-secret
              key: OPENROUTER_API_KEY